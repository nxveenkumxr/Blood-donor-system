{% extends "base.html" %}

{% block content %}

<div class="card shadow p-4">

    <h3 class="text-danger mb-3">Search Donors</h3>

    <form method="get" class="row g-3 mb-4">

        <div class="col-md-4">
            <label class="form-label">Blood Group</label>
            <select name="blood_group" class="form-select">
                <option value="">All</option>
                <option value="A+" {% if selected_blood == "A+" %}selected{% endif %}>A+</option>
                <option value="A-" {% if selected_blood == "A-" %}selected{% endif %}>A-</option>
                <option value="B+" {% if selected_blood == "B+" %}selected{% endif %}>B+</option>
                <option value="B-" {% if selected_blood == "B-" %}selected{% endif %}>B-</option>
                <option value="O+" {% if selected_blood == "O+" %}selected{% endif %}>O+</option>
                <option value="O-" {% if selected_blood == "O-" %}selected{% endif %}>O-</option>
                <option value="AB+" {% if selected_blood == "AB+" %}selected{% endif %}>AB+</option>
                <option value="AB-" {% if selected_blood == "AB-" %}selected{% endif %}>AB-</option>
            </select>
        </div>

        <div class="col-md-4">
            <label class="form-label">City</label>
            <input type="text" name="city" class="form-control"
                   value="{{ selected_city|default:'' }}"
                   placeholder="Enter city">
        </div>

        <div class="col-md-4 d-flex align-items-end">
            <button type="submit" class="btn btn-danger w-100">
                Search
            </button>
        </div>

    </form>

    <hr>

    <h4 class="mb-3">Available Donors</h4>

    <table class="table table-bordered table-striped">
        <thead class="table-danger">
            <tr>
                <th>Name</th>
                <th>Blood Group</th>
                <th>City</th>
                <th>Contact</th>
            </tr>
        </thead>
        <tbody>
            {% for donor in donors %}
            <tr>
                <td>{{ donor.full_name }}</td>
                <td>{{ donor.blood_group }}</td>
                <td>{{ donor.city }}</td>
                <td>{{ donor.contact_number }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center text-muted">
                    No donors found.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}

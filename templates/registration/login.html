{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <div class="card shadow p-4">
            <h3 class="text-danger mb-3 text-center">Login</h3>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-danger w-100">
                    Login
                </button>
            </form>
        </div>

    </div>
</div>

{% endblock %}
